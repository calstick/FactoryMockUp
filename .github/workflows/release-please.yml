name: Release Please

# Automated release notes / changelog generation. On each push to main,
# release-please parses Conventional Commit messages and maintains a release
# PR; merging that PR cuts a version bump, updates CHANGELOG.md, and publishes
# a GitHub Release with generated notes. This documents agent contributions and
# provides a release-based deployment trigger.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
