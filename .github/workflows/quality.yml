name: Code Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Type-check (tsc --checkJs)
        run: npm run typecheck

      - name: Dead code & unused dependencies (knip)
        run: npm run deadcode

      - name: Duplicate code (jscpd)
        run: npm run dupcheck

      - name: Dead feature flags (registry vs usage)
        run: npm run deadflags

      - name: Validate AGENTS.md (scripts, links, paths)
        run: npm run validate:agents
