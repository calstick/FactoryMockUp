name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run the suite with coverage. The verbose reporter prints per-test
      # durations so test performance is visible directly in the CI log.
      - name: Run tests with coverage
        run: npm run test:coverage

      # Test performance tracking: persist timing/coverage output as an artifact.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14
